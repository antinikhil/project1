{% extends 'gift_nest/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-3">
            <div class="list-group shadow-sm rounded">
                <a href="{% url 'customer_dashboard' %}" class="list-group-item list-group-item-action">Dashboard</a>
                <a href="{% url 'order_history' %}" class="list-group-item list-group-item-action">My Orders</a>
                <a href="{% url 'profile_page' %}" class="list-group-item list-group-item-action active">Profile Settings</a>
            </div>
        </div>
        <div class="col-md-9">
            <div class="card shadow-sm border-0 p-4">
                <h2>Profile Settings</h2>
                <hr>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" class="form-control" value="{{ user.username }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control" value="{{ user.email }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone Number</label>
                        <input type="text" name="phone_number" class="form-control" value="{{ customer.phone_number }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Shipping Address</label>
                        <textarea name="address" class="form-control" rows="4" required>{{ customer.address }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-gold px-5">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
