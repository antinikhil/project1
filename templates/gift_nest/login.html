{% extends 'gift_nest/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4">
                <h2 class="text-center mb-4">Welcome Back</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn btn-gold w-100 py-3 mt-3">Login</button>
                </form>
                <p class="text-center mt-4 mb-0">New to Gift Nest? <a href="{% url 'register' %}">Sign Up</a></p>
            </div>
        </div>
    </div>
</div>

<style>
    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
    }
</style>
{% endblock %}
